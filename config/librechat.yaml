          - "xai-grok-imagine-image"
          - "xai-grok-imagine-image-pro"
          - "xai-race-fast"
          - "xai-race-smart"
          - "xai-race-all"
        fetch: false
      titleConvo: true
      titleModel: "mistral-large-thinking"
      titleEndpoint: "Mistral Thinking"
      titleMethod: "completion"
      summarize: false
      forcePrompt: false
      maxContextTokens: 2000000
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"

    - name: "Tier Chooser"
      apiKey: "not-needed"
      baseURL: "http://host.docker.internal:9900/v1"
      models:
        default:
          - "tier-race-quick"
          - "tier-race-medium"
          - "tier-race-full-throttle"
        fetch: true
      titleConvo: true
      titleModel: "tier-race-quick"
      summarize: false
      forcePrompt: false
      maxContextTokens: 2000000
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"
