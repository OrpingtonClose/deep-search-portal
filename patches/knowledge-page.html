<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Miro — Knowledge Corpus</title>
<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
    --text: #e6edf3; --text2: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --yellow: #d29922; --red: #f85149;
    --border: #30363d; --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size:14px; line-height:1.6; padding:24px; }

  .header { display:flex; align-items:center; gap:12px; margin-bottom:20px; border-bottom:1px solid var(--border); padding-bottom:16px; flex-wrap:wrap; }
  .header h1 { font-size:20px; font-weight:600; }
  .header .badge { background:var(--bg3); border:1px solid var(--border); border-radius:12px; padding:2px 10px; font-size:12px; color:var(--text2); }

  .controls { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; align-items:center; }
  .search-box { flex:1; min-width:200px; padding:8px 12px; background:var(--bg2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:14px; outline:none; }
  .search-box:focus { border-color:var(--accent); }
  .filter-btn { padding:6px 12px; background:var(--bg2); border:1px solid var(--border); border-radius:6px; color:var(--text2); cursor:pointer; font-size:12px; }
  .filter-btn:hover, .filter-btn.active { border-color:var(--accent); color:var(--accent); }
  .clear-btn { padding:6px 12px; background:var(--red); border:none; border-radius:6px; color:#fff; cursor:pointer; font-size:12px; }
  .clear-btn:hover { opacity:.8; }

  .stats-bar { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:20px; padding:12px 16px; background:var(--bg2); border:1px solid var(--border); border-radius:8px; }
  .stat { display:flex; flex-direction:column; }
  .stat-label { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--text2); }
  .stat-value { font-size:18px; font-weight:600; color:var(--accent); }

  .empty { text-align:center; padding:60px 20px; color:var(--text2); }
  .empty h2 { font-size:18px; margin-bottom:8px; color:var(--text); }

  .session-list { display:flex; flex-direction:column; gap:12px; }

  .session-card { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:16px; transition:border-color .2s; }
  .session-card:hover { border-color:var(--accent); }
  .session-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .session-time { font-size:13px; color:var(--text2); }
  .session-badges { display:flex; gap:6px; }
  .session-badges .badge { font-size:11px; }

  .query-list { display:flex; flex-direction:column; gap:6px; }
  .query-item { display:flex; align-items:flex-start; gap:8px; padding:6px 10px; background:var(--bg3); border-radius:4px; font-size:13px; }
  .query-tool { font-family:var(--mono); color:var(--green); font-size:12px; white-space:nowrap; min-width:120px; }
  .query-tool.duplicate { color:var(--yellow); }
  .query-text { color:var(--text); word-break:break-word; flex:1; }
  .query-meta { color:var(--text2); font-size:11px; white-space:nowrap; }

  .footer { margin-top:32px; padding-top:16px; border-top:1px solid var(--border); color:var(--text2); font-size:12px; text-align:center; }
</style>
</head>
<body>

<div class="header">
  <h1>Knowledge Corpus</h1>
  <span class="badge" id="session-count"></span>
  <span class="badge" id="query-count"></span>
</div>

<div class="controls">
  <input type="text" class="search-box" id="search" placeholder="Search queries, tools, sessions…">
  <button class="filter-btn" data-tool="all">All Tools</button>
  <button class="filter-btn" data-tool="brave_search">Brave</button>
  <button class="filter-btn" data-tool="exa_search">Exa</button>
  <button class="filter-btn" data-tool="firecrawl_scrape">Firecrawl</button>
  <button class="clear-btn" id="clear-btn" title="Clear all knowledge data">Clear All</button>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div id="content">
  <div class="empty" id="empty-state">
    <h2>No research sessions yet</h2>
    <p>Use the Miro model to conduct research. Queries and findings will be automatically recorded here.</p>
  </div>
</div>

<div class="footer">
  Miro Knowledge Corpus — persistent across sessions via localStorage
</div>

<script>
(function () {
  'use strict';

  var contentEl = document.getElementById('content');
  var emptyEl = document.getElementById('empty-state');
  var statsBarEl = document.getElementById('stats-bar');
  var sessionCountEl = document.getElementById('session-count');
  var queryCountEl = document.getElementById('query-count');
  var searchEl = document.getElementById('search');
  var clearBtn = document.getElementById('clear-btn');
  var activeToolFilter = 'all';

  function loadKnowledge() {
    try {
      var raw = localStorage.getItem('miro_knowledge');
      return raw ? JSON.parse(raw) : [];
    } catch (_e) {
      return [];
    }
  }

  function render() {
    var entries = loadKnowledge();
    var searchTerm = (searchEl.value || '').toLowerCase().trim();

    // Filter by search
    if (searchTerm) {
      entries = entries.filter(function (e) {
        var text = JSON.stringify(e).toLowerCase();
        return text.indexOf(searchTerm) !== -1;
      });
    }

    // Filter by tool
    if (activeToolFilter !== 'all') {
      entries = entries.filter(function (e) {
        return e.tools && e.tools.some(function (t) { return t.tool === activeToolFilter; });
      });
    }

    // Sort by timestamp descending (newest first)
    entries.sort(function (a, b) {
      return (b.timestamp || '').localeCompare(a.timestamp || '');
    });

    // Update counts
    var allEntries = loadKnowledge();
    var totalQueries = allEntries.reduce(function (n, e) { return n + (e.tools ? e.tools.length : 0); }, 0);
    sessionCountEl.textContent = allEntries.length + ' sessions';
    queryCountEl.textContent = totalQueries + ' queries';

    // Stats
    var totalToolCalls = allEntries.reduce(function (n, e) { return n + (e.toolCalls || 0); }, 0);
    var totalTime = allEntries.reduce(function (n, e) { return n + (e.elapsed || 0); }, 0);
    var toolCounts = {};
    allEntries.forEach(function (e) {
      if (e.tools) {
        e.tools.forEach(function (t) {
          toolCounts[t.tool] = (toolCounts[t.tool] || 0) + 1;
        });
      }
    });

    statsBarEl.innerHTML = [
      '<div class="stat"><span class="stat-label">Sessions</span><span class="stat-value">' + allEntries.length + '</span></div>',
      '<div class="stat"><span class="stat-label">Total Queries</span><span class="stat-value">' + totalQueries + '</span></div>',
      '<div class="stat"><span class="stat-label">Total Tool Calls</span><span class="stat-value">' + totalToolCalls + '</span></div>',
      '<div class="stat"><span class="stat-label">Total Time</span><span class="stat-value">' + totalTime.toFixed(1) + 's</span></div>',
      Object.keys(toolCounts).map(function (tool) {
        return '<div class="stat"><span class="stat-label">' + escapeHtml(tool) + '</span><span class="stat-value">' + toolCounts[tool] + '</span></div>';
      }).join(''),
    ].join('');

    if (!entries.length) {
      emptyEl.style.display = '';
      // Remove session list if it exists
      var existing = contentEl.querySelector('.session-list');
      if (existing) existing.remove();
      return;
    }
    emptyEl.style.display = 'none';

    var html = '<div class="session-list">';
    for (var i = 0; i < entries.length; i++) {
      var e = entries[i];
      var time = e.timestamp ? new Date(e.timestamp).toLocaleString() : 'Unknown';
      html += '<div class="session-card">';
      html += '<div class="session-header">';
      html += '<span class="session-time">' + escapeHtml(time) + '</span>';
      html += '<div class="session-badges">';
      html += '<span class="badge">' + (e.turns || 0) + ' turns</span>';
      html += '<span class="badge">' + (e.toolCalls || 0) + ' calls</span>';
      html += '<span class="badge">' + (e.elapsed || 0) + 's</span>';
      if (e.forced) { html += '<span class="badge" style="color:var(--yellow)">forced</span>'; }
      html += '</div></div>';

      if (e.tools && e.tools.length) {
        html += '<div class="query-list">';
        for (var j = 0; j < e.tools.length; j++) {
          var t = e.tools[j];
          var isDup = t.status === 'duplicate';
          html += '<div class="query-item">';
          html += '<span class="query-tool' + (isDup ? ' duplicate' : '') + '">' + escapeHtml(t.tool) + '</span>';
          html += '<span class="query-text">' + escapeHtml(t.query || '—') + '</span>';
          if (!isDup && t.chars) {
            html += '<span class="query-meta">' + formatChars(t.chars) + ' / ' + (t.ms || 0) + 'ms</span>';
          }
          html += '</div>';
        }
        html += '</div>';
      }
      html += '</div>';
    }
    html += '</div>';

    // Replace content (keep empty-state element)
    var existing = contentEl.querySelector('.session-list');
    if (existing) existing.remove();
    contentEl.insertAdjacentHTML('beforeend', html);
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function formatChars(n) {
    if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
    return n + '';
  }

  // ── Event handlers ───────────────────────────────────────────────────
  searchEl.addEventListener('input', function () { render(); });

  document.querySelectorAll('.filter-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      activeToolFilter = btn.dataset.tool;
      document.querySelectorAll('.filter-btn').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      render();
    });
  });

  clearBtn.addEventListener('click', function () {
    if (confirm('Clear all knowledge data? This cannot be undone.')) {
      localStorage.removeItem('miro_knowledge');
      render();
    }
  });

  // ── BroadcastChannel for live updates ────────────────────────────────
  try {
    var channel = new BroadcastChannel('miro-trace');
    channel.onmessage = function (e) {
      if (e.data.action === 'knowledge' || e.data.action === 'summary') {
        render();
      }
    };
  } catch (_e) {
    // Fallback: poll localStorage
    setInterval(render, 3000);
  }

  // ── Initialize ───────────────────────────────────────────────────────
  // Mark "All Tools" as active
  document.querySelector('.filter-btn[data-tool="all"]').classList.add('active');
  render();
})();
</script>
</body>
</html>
