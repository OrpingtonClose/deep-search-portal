# =============================================================================
# Deep Search Portal — LibreChat Configuration
#
# Models are organized into four groups:
#   Powerhouse   — Multi-API convergence models that race or orchestrate
#                  across providers. Grok 4.20 is the default.
#   Research     — Deep multi-source research engines with reports
#   Chat         — Individual models for quick conversation, code, and images
#   Experimental — Swarm ingestion and niche uncensored tiers
#
# Proxy services (same VM or reachable via HTTP):
#   Thinking Proxy:           port 9100
#   Deep Research Proxy:      port 9200
#   Persistent Research:      port 9300
#   MiroFlow Sprint:          port 9400
#   Swarm Proxy:              port 9500
#   G0DM0D3 Proxy:            port 9600
#   xAI Native Proxy:         port 9700
# =============================================================================

version: 1.3.5
cache: true

# ---------------------------------------------------------------------------
# Model Specs — what the user sees in the dropdown
# ---------------------------------------------------------------------------
modelSpecs:
  enforce: true
  prioritize: true
  list:
    # =======================================================================
    #  POWERHOUSE — Multi-API convergence: race or orchestrate across providers
    # =======================================================================
    - name: "xai-grok-420-reasoning"
      label: "Grok 4.20 Reasoning"
      description: "The flagship. xAI's most powerful model with extended thinking, 2M token context, and built-in web + X/Twitter search. Best for complex analysis and deep reasoning."
      group: "Powerhouse"
      default: true
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-4.20-0309-reasoning"

    - name: "xai-grok-420-multiagent"
      label: "Grok 4.20 Multi-Agent"
      description: "Internally coordinates parallel reasoning streams. Excels at problems that benefit from multiple perspectives working together."
      group: "Powerhouse"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-4.20-multi-agent-0309"

    - name: "godmode-classic"
      label: "G0DM0D3 Classic"
      description: "Races 5 top models (Claude, Grok, Gemini, GPT-4, Hermes 405B) across different providers and picks the best unfiltered answer."
      group: "Powerhouse"
      preset:
        endpoint: "G0DM0D3"
        model: "godmode-classic"

    - name: "xai-race-smart"
      label: "xAI Race (Smartest)"
      description: "Races the 3 smartest Grok reasoning models simultaneously — Grok 3, Grok 4.1, and Grok 4.20 — and picks the deepest answer."
      group: "Powerhouse"
      preset:
        endpoint: "xAI Native"
        model: "xai-race-smart"

    - name: "xai-race-all"
      label: "xAI Race (All Models)"
      description: "Races ALL 8 Grok text models at once and returns the highest-scoring response. Maximally thorough but slower."
      group: "Powerhouse"
      preset:
        endpoint: "xAI Native"
        model: "xai-race-all"

    - name: "xai-race-fast"
      label: "xAI Race (Fastest)"
      description: "Races the 3 fastest Grok models — Grok 3 Fast, Grok 4.1 Fast, and Grok Code — for quick best-of-three answers."
      group: "Powerhouse"
      preset:
        endpoint: "xAI Native"
        model: "xai-race-fast"

    - name: "ultraplinian-research"
      label: "Multi-Model Researcher"
      description: "Queries many uncensored models from different providers in parallel, merges and scores their research outputs into one comprehensive answer."
      group: "Powerhouse"
      preset:
        endpoint: "G0DM0D3"
        model: "ultraplinian-research"

    # =======================================================================
    #  RESEARCH — Deep multi-source investigation with reports
    # =======================================================================
    - name: "deep-researcher"
      label: "Deep Researcher"
      description: "Thorough multi-source investigation. Builds a knowledge net from web, forums, archives, academic databases, and dark web. Produces a detailed report. Takes 10-30 minutes."
      group: "Research"
      preset:
        endpoint: "Persistent MiroFlow"
        model: "persistent-miroflow"

    - name: "quick-researcher"
      label: "Quick Researcher"
      description: "Same research engine as Deep Researcher but capped at 2 rounds. Gets you useful results in 2-5 minutes when you need answers fast."
      group: "Research"
      preset:
        endpoint: "MiroFlow Sprint"
        model: "miroflow-sprint"

    - name: "single-agent-research"
      label: "Focused Search"
      description: "Single-agent research that follows one line of inquiry for up to 15 steps. Best for targeted questions where you know exactly what you want."
      group: "Research"
      preset:
        endpoint: "Deep Research"
        model: "miroflow"

    # =======================================================================
    #  CHAT — Individual models for conversation, code, and images
    # =======================================================================
    - name: "xai-grok-420-nonreasoning"
      label: "Grok 4.20 Direct"
      description: "Same powerful architecture as Grok 4.20 but without the thinking step. Faster responses for straightforward questions. 2M context."
      group: "Chat"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-4.20-0309-non-reasoning"

    - name: "xai-grok-41-fast-reasoning"
      label: "Grok 4.1 Fast (Thinking)"
      description: "Fast reasoning model at 1/10th the cost of Grok 4.20. Shows its thinking process. Best balance of speed, intelligence, and price."
      group: "Chat"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-4-1-fast-reasoning"

    - name: "xai-grok-41-fast-nonreasoning"
      label: "Grok 4.1 Fast (Direct)"
      description: "Fastest Grok 4 variant. No reasoning overhead, 2M context, very low cost. Ideal for quick answers and high-throughput tasks."
      group: "Chat"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-4-1-fast-non-reasoning"

    - name: "xai-grok-3-fast"
      label: "Grok 3 Fast"
      description: "Fast, cheap, and proven uncensored. Great tool calling support. The engine behind our research subagents."
      group: "Chat"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-3-fast"

    - name: "xai-grok-3"
      label: "Grok 3"
      description: "Full Grok 3 model. Excellent tool calling, 131K context. Strong general-purpose model with lower censorship than most frontier models."
      group: "Chat"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-3"

    - name: "thinking-chat"
      label: "Mistral Thinking"
      description: "Mistral Large with visible reasoning. Good for step-by-step explanations. Note: may refuse sensitive topics."
      group: "Chat"
      preset:
        endpoint: "Mistral Thinking"
        model: "mistral-large-thinking"

    - name: "ultraplinian-fast"
      label: "Uncensored Fast"
      description: "Quick unfiltered answers by racing the fastest available models across multiple providers."
      group: "Chat"
      preset:
        endpoint: "G0DM0D3"
        model: "ultraplinian-fast"

    - name: "xai-grok-code"
      label: "Grok Code"
      description: "Purpose-built for code generation, debugging, and software engineering. Optimized for programming languages."
      group: "Chat"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-code-fast-1"

    - name: "xai-grok-3-mini"
      label: "Grok 3 Mini"
      description: "Compact reasoning model with adjustable thinking depth. Good for quick logic puzzles and math at minimal cost."
      group: "Chat"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-3-mini"

    - name: "xai-imagine"
      label: "Grok Imagine"
      description: "AI image generation from text prompts. Multiple aspect ratios and resolutions. $0.02 per image."
      group: "Chat"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-imagine-image"

    - name: "xai-imagine-pro"
      label: "Grok Imagine Pro"
      description: "Premium image generation with higher quality and detail. $0.07 per image."
      group: "Chat"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-imagine-image-pro"

    # =======================================================================
    #  EXPERIMENTAL — Swarm ingestion and niche uncensored tiers
    # =======================================================================
    - name: "swarm-ingest"
      label: "Document Swarm"
      description: "Upload large documents and let a swarm of agents digest them through collaborative discussion. Ask questions about the content afterward."
      group: "Experimental"
      preset:
        endpoint: "Swarm Deep Search"
        model: "swarm-miroflow"

    - name: "xai-grok-4-reasoning"
      label: "Grok 4 (Thinking)"
      description: "Grok 4 with extended reasoning. Step-by-step problem solving with 2M token context."
      group: "Experimental"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-4-fast-reasoning"

    - name: "xai-grok-4-nonreasoning"
      label: "Grok 4 (Direct)"
      description: "Grok 4 without reasoning. Fast, capable, 2M context."
      group: "Experimental"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-4-fast-non-reasoning"

    - name: "xai-grok-4-0709"
      label: "Grok 4 (July 2025)"
      description: "Original Grok 4 release with reasoning. 2M context, strong at math, coding, and analytical tasks."
      group: "Experimental"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-4-0709"

    - name: "ultraplinian-ultra"
      label: "Ultra Uncensored"
      description: "Races all 55 available models simultaneously and picks the best unfiltered answer. Very slow but maximally thorough."
      group: "Experimental"
      preset:
        endpoint: "G0DM0D3"
        model: "ultraplinian-ultra"

    - name: "ultraplinian-power"
      label: "Power Uncensored"
      description: "Races the top 30 most capable models. Balance of speed and breadth."
      group: "Experimental"
      preset:
        endpoint: "G0DM0D3"
        model: "ultraplinian-power"

    - name: "ultraplinian-smart"
      label: "Smart Uncensored"
      description: "Races the 20 smartest models. Favours intelligence over speed."
      group: "Experimental"
      preset:
        endpoint: "G0DM0D3"
        model: "ultraplinian-smart"

    - name: "ultraplinian-standard"
      label: "Standard Uncensored"
      description: "Races a balanced set of 15 models. Good default uncensored option."
      group: "Experimental"
      preset:
        endpoint: "G0DM0D3"
        model: "ultraplinian-standard"

# ---------------------------------------------------------------------------
# Backend endpoint wiring (users don't see this directly)
# ---------------------------------------------------------------------------
endpoints:
  custom:
    - name: "Mistral Thinking"
      apiKey: "not-needed"
      baseURL: "http://host.docker.internal:9100/v1"
      models:
        default:
          - "mistral-large-thinking"
        fetch: true
      titleConvo: true
      titleModel: "mistral-large-thinking"
      titleMethod: "completion"
      summarize: false
      maxContextTokens: 1000000
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"

    - name: "Persistent MiroFlow"
      apiKey: "not-needed"
      baseURL: "http://host.docker.internal:9300/v1"
      models:
        default:
          - "persistent-miroflow"
        fetch: true
      titleConvo: true
      titleModel: "mistral-large-thinking"
      titleEndpoint: "Mistral Thinking"
      titleMethod: "completion"
      summarize: false
      maxContextTokens: 1000000
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"

    - name: "MiroFlow Sprint"
      apiKey: "not-needed"
      baseURL: "http://host.docker.internal:9400/v1"
      models:
        default:
          - "miroflow-sprint"
        fetch: true
      titleConvo: true
      titleModel: "mistral-large-thinking"
      titleEndpoint: "Mistral Thinking"
      titleMethod: "completion"
      summarize: false
      maxContextTokens: 1000000
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"

    - name: "Deep Research"
      apiKey: "not-needed"
      baseURL: "http://host.docker.internal:9200/v1"
      models:
        default:
          - "miroflow"
        fetch: true
      titleConvo: true
      titleModel: "mistral-large-thinking"
      titleEndpoint: "Mistral Thinking"
      titleMethod: "completion"
      summarize: false
      maxContextTokens: 1000000
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"

    - name: "Swarm Deep Search"
      apiKey: "not-needed"
      baseURL: "http://host.docker.internal:9500/v1"
      models:
        default:
          - "swarm-miroflow"
        fetch: true
      titleConvo: true
      titleModel: "mistral-large-thinking"
      titleEndpoint: "Mistral Thinking"
      titleMethod: "completion"
      summarize: false
      maxContextTokens: 1000000
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"

    - name: "G0DM0D3"
      apiKey: "not-needed"
      baseURL: "http://host.docker.internal:9600/v1"
      models:
        default:
          - "godmode-classic"
          - "ultraplinian-fast"
          - "ultraplinian-standard"
          - "ultraplinian-smart"
          - "ultraplinian-power"
          - "ultraplinian-ultra"
          - "ultraplinian-research"
        fetch: false
      titleConvo: true
      titleModel: "mistral-large-thinking"
      titleEndpoint: "Mistral Thinking"
      titleMethod: "completion"
      summarize: false
      forcePrompt: false
      maxContextTokens: 1000000
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"

    - name: "xAI Native"
      apiKey: "not-needed"
      baseURL: "http://host.docker.internal:9700/v1"
      models:
        default:
          - "xai-grok-4.20-0309-reasoning"
          - "xai-grok-4.20-0309-non-reasoning"
          - "xai-grok-4.20-multi-agent-0309"
          - "xai-grok-4-1-fast-reasoning"
          - "xai-grok-4-1-fast-non-reasoning"
          - "xai-grok-4-fast-reasoning"
          - "xai-grok-4-fast-non-reasoning"
          - "xai-grok-4-0709"
          - "xai-grok-3"
          - "xai-grok-3-fast"
          - "xai-grok-3-mini"
          - "xai-grok-code-fast-1"
          - "xai-grok-imagine-image"
          - "xai-grok-imagine-image-pro"
          - "xai-race-fast"
          - "xai-race-smart"
          - "xai-race-all"
        fetch: false
      titleConvo: true
      titleModel: "mistral-large-thinking"
      titleEndpoint: "Mistral Thinking"
      titleMethod: "completion"
      summarize: false
      forcePrompt: false
      maxContextTokens: 2000000
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"
