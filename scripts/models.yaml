# =============================================================================
# Model Management — Single Source of Truth
# =============================================================================
#
# This file defines every model proxy exposed in the Open WebUI dropdown.
# Run `python3 scripts/sync_models.py scripts/models.yaml` to apply.
#
# Adding a model:
#   1. Add an entry below under `models:`
#   2. Start the proxy service if it's new
#   3. Run sync_models.py
#
# Removing a model:
#   1. Delete the entry below
#   2. Run sync_models.py (it will deactivate the model and remove its grant)
#
# Fields:
#   display_name  — Human-readable name in the dropdown
#   description   — Tooltip / model description
#   provider_url  — OpenAI-compatible API base URL
#   api_key       — Literal API key (for local proxies: "not-needed")
#   api_key_env   — Environment variable name for the API key (overrides api_key)
#   public        — Whether model is visible to all users (default: true)
#   base_model_id — For preset models: the underlying model ID to route to
#   system_prompt — System prompt prepended to every conversation
#   temperature   — Sampling temperature
#   top_p         — Nucleus sampling parameter
#
# DB path default: /opt/openwebui-data/webui.db
# Override with: --db-path /path/to/webui.db
# =============================================================================

