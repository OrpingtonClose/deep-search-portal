# =============================================================================
# Deep Search Portal — nginx reverse proxy
#
# Sits in front of Open WebUI and the persistent research proxy so that
# Cloudflare Tunnel (or any single-origin client) can reach both services
# through one port.
#
# Usage:
#   1. Copy to /etc/nginx/sites-available/deep-search
#   2. ln -sf /etc/nginx/sites-available/deep-search /etc/nginx/sites-enabled/
#   3. rm -f /etc/nginx/sites-enabled/default
#   4. nginx -s reload   (or `nginx` if not yet running)
#
# Assumes:
#   - Open WebUI on port 3000
#   - Persistent research proxy on port 9300
#   - Cloudflare Tunnel points to localhost:3001
# =============================================================================

server {
    listen 3001;
    server_name _;
    client_max_body_size 50m;

    # Research API routes -> persistent proxy on port 9300
    location /research/ {
        proxy_pass http://127.0.0.1:9300;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else -> Open WebUI on port 3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }
}
