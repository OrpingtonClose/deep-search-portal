# =============================================================================
# Deep Search Portal — nginx reverse proxy
#
# Sits in front of LibreChat and the persistent research proxy so that
# Cloudflare Tunnel (or any single-origin client) can reach both services
# through one port.
#
# Usage:
#   1. Copy to /etc/nginx/sites-available/deep-search
#   2. ln -sf /etc/nginx/sites-available/deep-search /etc/nginx/sites-enabled/
#   3. rm -f /etc/nginx/sites-enabled/default
#   4. nginx -s reload   (or `nginx` if not yet running)
#
# Assumes:
#   - LibreChat on port 3000 (Docker maps 3080 -> 3000)
#   - Persistent research proxy on port 9300
#   - Cloudflare Tunnel points to localhost:3001
# =============================================================================

# ---------- Rate-limit zone for OAuth/login endpoints (#142) ----------
# 1 request per second per client IP, with a small burst of 3 to absorb
# a quick double-click without rejecting the first legitimate attempt.
# Cloudflare Tunnel connects locally, so $binary_remote_addr is always
# 127.0.0.1.  Remap to the real client IP via CF-Connecting-IP.
set_real_ip_from 127.0.0.1;
real_ip_header CF-Connecting-IP;

limit_req_zone $binary_remote_addr zone=oauth_limit:10m rate=1r/s;

server {
    listen 3001;
    server_name _;
    client_max_body_size 50m;

    # ---- OAuth / login rate-limiting (#142) ----
    # Covers Google OAuth callback and any login-related POST endpoints.
    # Burst=3 allows a small burst (e.g. redirect + JS fetch) but blocks
    # rapid hammering.  Returns 429 (Too Many Requests) on excess.
    location /oauth/ {
        limit_req zone=oauth_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/auth/ {
        limit_req zone=oauth_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Research API routes -> persistent proxy on port 9300
    location /research/ {
        proxy_pass http://127.0.0.1:9300;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Everything else -> LibreChat on port 3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }
}
