# =============================================================================
# Deep Search Portal — LibreChat Configuration
#
# Models are organized into four groups for clarity:
#   Simple       — Quick chat and single-question answers
#   Complex      — Deep multi-source research with reports
#   xAI Native   — Direct access to all xAI/Grok models via native API
#   Chooser      — Three-tier model selection (Quick / Medium / Full Throttle)
#   Experimental — Cutting-edge features still being refined
#
# Proxy services (same VM or reachable via HTTP):
#   Thinking Proxy:           port 9100
#   Deep Research Proxy:      port 9200
#   Persistent Research:      port 9300
#   MiroFlow Sprint:          port 9400
#   Swarm Proxy:              port 9500
#   G0DM0D3 Proxy:            port 9600
#   xAI Native Proxy:         port 9700
#   Tier Chooser Proxy:       port 9900
# =============================================================================

version: 1.3.5
cache: true

# ---------------------------------------------------------------------------
# Model Specs — what the user sees in the dropdown
# ---------------------------------------------------------------------------
modelSpecs:
  enforce: true
  prioritize: true
  list:
    # =======================================================================
    #  CHOOSER — Three-tier model selection (Quick / Medium / Full Throttle)
    # =======================================================================

    # --- Race modes (race all models in tier, return best) ---
    - name: "tier-race-quick"
      label: "Quick (Race)"
      description: "Races 6 fast models from Google, xAI, DeepSeek, OpenAI, Mistral, Qwen. Returns the best answer. Cheapest and fastest tier."
      group: "Chooser"
      default: true
      preset:
        endpoint: "Tier Chooser"
        model: "tier-race-quick"

    - name: "tier-race-medium"
      label: "Medium (Race)"
      description: "Races 8 balanced models including Claude Sonnet 4.6, Gemini 3 Pro, GPT-5.4, Grok 4.1 Reasoning, GLM-5. Best daily-driver tier."
      group: "Chooser"
      preset:
        endpoint: "Tier Chooser"
        model: "tier-race-medium"

    - name: "tier-race-full-throttle"
      label: "Full Throttle (Race)"
      description: "Races 7 flagship models including Claude Opus 4.6, GPT-5, Grok 4.20 Reasoning, DeepSeek R1, GLM-4.7. Maximum intelligence for hard problems."
      group: "Chooser"
      preset:
        endpoint: "Tier Chooser"
        model: "tier-race-full-throttle"

    # --- Individual model access (key models per tier) ---
    - name: "tier-gemini-flash"
      label: "Quick — Gemini 2.5 Flash"
      description: "Google Gemini 2.5 Flash. Ultra-fast, 1M context, multimodal. Direct to Google API."
      group: "Chooser"
      preset:
        endpoint: "Tier Chooser"
        model: "tier-google/gemini-2.5-flash"

    - name: "tier-deepseek-chat"
      label: "Quick — DeepSeek Chat"
      description: "DeepSeek V3. Cheapest strong model available. Direct to DeepSeek API."
      group: "Chooser"
      preset:
        endpoint: "Tier Chooser"
        model: "tier-deepseek/deepseek-chat"

    - name: "tier-claude-sonnet"
      label: "Medium — Claude Sonnet 4.6"
      description: "Anthropic Claude Sonnet 4.6. Frequently the practical winner in blind tests. Via OpenRouter."
      group: "Chooser"
      preset:
        endpoint: "Tier Chooser"
        model: "tier-anthropic/claude-sonnet-4.6"

    - name: "tier-gpt54"
      label: "Medium — GPT-5.4"
      description: "OpenAI GPT-5.4 Chat. Strong all-rounder. Direct to OpenAI API."
      group: "Chooser"
      preset:
        endpoint: "Tier Chooser"
        model: "tier-openai/gpt-5.4"

    - name: "tier-claude-opus"
      label: "Full Throttle — Claude Opus 4.6"
      description: "Anthropic Claude Opus 4.6. Reasoning king with max-effort thinking. Via OpenRouter."
      group: "Chooser"
      preset:
        endpoint: "Tier Chooser"
        model: "tier-anthropic/claude-opus-4.6"

    - name: "tier-grok-420"
      label: "Full Throttle — Grok 4.20 Reasoning"
      description: "xAI Grok 4.20 with extended thinking. 2M context, web+X search. Direct to xAI API."
      group: "Chooser"
      preset:
        endpoint: "Tier Chooser"
        model: "tier-x-ai/grok-4.20-0309-reasoning"

    - name: "tier-deepseek-r1"
      label: "Full Throttle — DeepSeek R1"
      description: "DeepSeek Reasoner (R1). Math and coding standout with chain-of-thought reasoning. Direct to DeepSeek API."
      group: "Chooser"
      preset:
        endpoint: "Tier Chooser"
        model: "tier-deepseek/deepseek-reasoner"

    - name: "tier-gpt5"
      label: "Full Throttle — GPT-5"
      description: "OpenAI GPT-5. Flagship model, highest capability ceiling. Direct to OpenAI API."
      group: "Chooser"
      preset:
        endpoint: "Tier Chooser"
        model: "tier-openai/gpt-5"

    # =======================================================================
    #  SIMPLE — Quick chat and single-question answers
    # =======================================================================
    - name: "thinking-chat"
      label: "Quick Chat"
      description: "Fast conversational assistant that shows its reasoning step by step."
      group: "Simple"
      preset:
        endpoint: "Mistral Thinking"
        model: "mistral-large-thinking"

    - name: "godmode-classic"
      label: "Uncensored Classic"
      description: "Races five top models and picks the best unfiltered answer. No safety guardrails."
      group: "Simple"
      preset:
        endpoint: "G0DM0D3"
        model: "godmode-classic"

    - name: "ultraplinian-fast"
      label: "Uncensored Fast"
      description: "Quick unfiltered answers from the fastest available models."
      group: "Simple"
      preset:
        endpoint: "G0DM0D3"
        model: "ultraplinian-fast"

    # =======================================================================
    #  COMPLEX — Deep multi-source research with reports
    # =======================================================================
    - name: "deep-researcher"
      label: "Deep Researcher"
      description: "Thorough multi-source investigation. Searches the web, forums, archives, and academic databases. Produces a detailed report. Takes 10-30 minutes."
      group: "Complex"
      preset:
        endpoint: "Persistent MiroFlow"
        model: "persistent-miroflow"

    - name: "quick-researcher"
      label: "Quick Researcher"
      description: "Same research engine as Deep Researcher but limited to 2 rounds. Gets you useful results in 2-5 minutes."
      group: "Complex"
      preset:
        endpoint: "MiroFlow Sprint"
        model: "miroflow-sprint"

    - name: "single-agent-research"
      label: "Focused Search"
      description: "Single-agent research that follows one line of inquiry for up to 15 steps. Good for targeted questions where you know exactly what you want."
      group: "Complex"
      preset:
        endpoint: "Deep Research"
        model: "miroflow"

    - name: "ultraplinian-research"
      label: "Uncensored Researcher"
      description: "Multi-model research mode. Queries many uncensored models in parallel and merges results."
      group: "Complex"
      preset:
        endpoint: "G0DM0D3"
        model: "ultraplinian-research"

    # =======================================================================
    #  xAI NATIVE — Direct access to all Grok models via xAI's own API
    # =======================================================================

    # --- Flagship reasoning ---
    - name: "xai-grok-420-reasoning"
      label: "Grok 4.20 Reasoning"
      description: "xAI's most powerful model. Extended thinking with 2M token context. Supports web search and X/Twitter search natively. Best for complex analysis, research, and multi-step reasoning. $2/$6 per M tokens."
      group: "xAI Native"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-4.20-0309-reasoning"

    - name: "xai-grok-420-nonreasoning"
      label: "Grok 4.20 Direct"
      description: "Same architecture as Grok 4.20 Reasoning but without the thinking step. Faster responses, 2M context. Good for straightforward questions. $2/$6 per M tokens."
      group: "xAI Native"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-4.20-0309-non-reasoning"

    - name: "xai-grok-420-multiagent"
      label: "Grok 4.20 Multi-Agent"
      description: "Multi-agent orchestration model that internally coordinates parallel reasoning streams. Excels at problems requiring multiple perspectives or divide-and-conquer strategies. $2/$6 per M tokens."
      group: "xAI Native"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-4.20-multi-agent-0309"

    # --- Fast Grok 4 variants ---
    - name: "xai-grok-41-fast-reasoning"
      label: "Grok 4.1 Fast (Thinking)"
      description: "Fast reasoning model with 2M context at 1/10th the cost of Grok 4.20. Shows its thinking process. Best balance of speed, intelligence, and price. $0.20/$0.50 per M tokens."
      group: "xAI Native"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-4-1-fast-reasoning"

    - name: "xai-grok-41-fast-nonreasoning"
      label: "Grok 4.1 Fast (Direct)"
      description: "Fastest Grok 4 variant without reasoning overhead. 2M context, low cost. Ideal for quick answers, code generation, and high-throughput tasks. $0.20/$0.50 per M tokens."
      group: "xAI Native"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-4-1-fast-non-reasoning"

    # --- Grok 4 base variants ---
    - name: "xai-grok-4-reasoning"
      label: "Grok 4 (Thinking)"
      description: "Grok 4 with extended reasoning. Step-by-step problem solving with 2M token context. $0.20/$0.50 per M tokens."
      group: "xAI Native"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-4-fast-reasoning"

    - name: "xai-grok-4-nonreasoning"
      label: "Grok 4 (Direct)"
      description: "Grok 4 without reasoning. Fast, capable, 2M context. $0.20/$0.50 per M tokens."
      group: "xAI Native"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-4-fast-non-reasoning"

    - name: "xai-grok-4-0709"
      label: "Grok 4 (July 2025)"
      description: "Original Grok 4 release with reasoning. 2M context, strong at math, coding, and analytical tasks. $2/$6 per M tokens."
      group: "xAI Native"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-4-0709"

    # --- Grok 3 family ---
    - name: "xai-grok-3"
      label: "Grok 3"
      description: "Full Grok 3 model. Excellent tool calling, 131K context. Strong general-purpose model with lower censorship than most frontier models. $3/$9 per M tokens."
      group: "xAI Native"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-3"

    - name: "xai-grok-3-fast"
      label: "Grok 3 Fast"
      description: "Faster, cheaper Grok 3 variant. Great tool calling support. Our default research subagent model — proven uncensored with the Icarus prompt. $0.20/$0.50 per M tokens."
      group: "xAI Native"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-3-fast"

    - name: "xai-grok-3-mini"
      label: "Grok 3 Mini"
      description: "Compact reasoning model with adjustable thinking depth (low/high effort). Good for quick logic puzzles and math at minimal cost. $0.30/$0.50 per M tokens."
      group: "xAI Native"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-3-mini"

    # --- Specialist models ---
    - name: "xai-grok-code"
      label: "Grok Code"
      description: "Purpose-built for code generation, debugging, and software engineering tasks. Optimized for programming languages and technical documentation. $0.20/$0.50 per M tokens."
      group: "xAI Native"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-code-fast-1"

    # --- Image generation ---
    - name: "xai-imagine"
      label: "Grok Imagine"
      description: "AI image generation from text prompts. Supports multiple aspect ratios and resolutions. Fast and affordable at $0.02 per image."
      group: "xAI Native"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-imagine-image"

    - name: "xai-imagine-pro"
      label: "Grok Imagine Pro"
      description: "Premium image generation with higher quality and detail. $0.07 per image. Best for professional-quality visuals."
      group: "xAI Native"
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-imagine-image-pro"

    # --- Catch-all race modes ---
    - name: "xai-race-fast"
      label: "xAI Race (Fast)"
      description: "Races the 3 fastest xAI models simultaneously and returns the best answer. Quick results from Grok 3 Fast, Grok 4.1 Fast, and Grok Code."
      group: "xAI Native"
      preset:
        endpoint: "xAI Native"
        model: "xai-race-fast"

    - name: "xai-race-smart"
      label: "xAI Race (Smart)"
      description: "Races the 3 smartest reasoning models — Grok 3, Grok 4.1 Reasoning, and Grok 4.20 Reasoning — and picks the deepest answer."
      group: "xAI Native"
      preset:
        endpoint: "xAI Native"
        model: "xai-race-smart"

    - name: "xai-race-all"
      label: "xAI Race (All Models)"
      description: "The ultimate catch-all: races ALL 8 xAI text models at once and returns the highest-scoring response. Slow but maximally thorough."
      group: "xAI Native"
      preset:
        endpoint: "xAI Native"
        model: "xai-race-all"

    # =======================================================================
    #  EXPERIMENTAL — Cutting-edge features still being refined
    # =======================================================================
    - name: "swarm-ingest"
      label: "Document Swarm"
      description: "Upload large documents and let a swarm of agents digest them through collaborative discussion. Ask questions about the content afterward."
      group: "Experimental"
      preset:
        endpoint: "Swarm Deep Search"
        model: "swarm-miroflow"

    - name: "ultraplinian-ultra"
      label: "Ultra Uncensored"
      description: "Races all 55 available models simultaneously and picks the best unfiltered answer. Slow but thorough."
      group: "Experimental"
      preset:
        endpoint: "G0DM0D3"
        model: "ultraplinian-ultra"

    - name: "ultraplinian-power"
      label: "Power Uncensored"
      description: "Races the top 30 most capable models. Balance of speed and breadth."
      group: "Experimental"
      preset:
        endpoint: "G0DM0D3"
        model: "ultraplinian-power"

    - name: "ultraplinian-smart"
      label: "Smart Uncensored"
      description: "Races the 20 smartest models. Favours intelligence over speed."
      group: "Experimental"
      preset:
        endpoint: "G0DM0D3"
        model: "ultraplinian-smart"

    - name: "ultraplinian-standard"
      label: "Standard Uncensored"
      description: "Races a balanced set of 15 models. Good default uncensored option."
      group: "Experimental"
      preset:
        endpoint: "G0DM0D3"
        model: "ultraplinian-standard"

# ---------------------------------------------------------------------------
# Backend endpoint wiring (users don't see this directly)
# ---------------------------------------------------------------------------
endpoints:
  custom:
    - name: "Mistral Thinking"
      apiKey: "not-needed"
      baseURL: "http://host.docker.internal:9100/v1"
      models:
        default:
          - "mistral-large-thinking"
        fetch: true
      titleConvo: true
      titleModel: "mistral-large-thinking"
      summarize: false
      maxContextTokens: 1000000
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"

    - name: "Persistent MiroFlow"
      apiKey: "not-needed"
      baseURL: "http://host.docker.internal:9300/v1"
      models:
        default:
          - "persistent-miroflow"
        fetch: true
      titleConvo: true
      titleModel: "persistent-miroflow"
      summarize: false
      maxContextTokens: 1000000
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"

    - name: "MiroFlow Sprint"
      apiKey: "not-needed"
      baseURL: "http://host.docker.internal:9400/v1"
      models:
        default:
          - "miroflow-sprint"
        fetch: true
      titleConvo: true
      titleModel: "miroflow-sprint"
      summarize: false
      maxContextTokens: 1000000
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"

    - name: "Deep Research"
      apiKey: "not-needed"
      baseURL: "http://host.docker.internal:9200/v1"
      models:
        default:
          - "miroflow"
        fetch: true
      titleConvo: true
      titleModel: "miroflow"
      summarize: false
      maxContextTokens: 1000000
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"

    - name: "Swarm Deep Search"
      apiKey: "not-needed"
      baseURL: "http://host.docker.internal:9500/v1"
      models:
        default:
          - "swarm-miroflow"
        fetch: true
      titleConvo: true
      titleModel: "swarm-miroflow"
      summarize: false
      maxContextTokens: 1000000
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"

    - name: "G0DM0D3"
      apiKey: "not-needed"
      baseURL: "http://host.docker.internal:9600/v1"
      models:
        default:
          - "godmode-classic"
          - "ultraplinian-fast"
          - "ultraplinian-standard"
          - "ultraplinian-smart"
          - "ultraplinian-power"
          - "ultraplinian-ultra"
          - "ultraplinian-research"
        fetch: false
      titleConvo: true
      titleModel: "godmode-classic"
      summarize: false
      forcePrompt: false
      maxContextTokens: 1000000
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"

    - name: "xAI Native"
      apiKey: "not-needed"
      baseURL: "http://host.docker.internal:9700/v1"
      models:
        default:
          - "xai-grok-4.20-0309-reasoning"
          - "xai-grok-4.20-0309-non-reasoning"
          - "xai-grok-4.20-multi-agent-0309"
          - "xai-grok-4-1-fast-reasoning"
          - "xai-grok-4-1-fast-non-reasoning"
          - "xai-grok-4-fast-reasoning"
          - "xai-grok-4-fast-non-reasoning"
          - "xai-grok-4-0709"
          - "xai-grok-3"
          - "xai-grok-3-fast"
          - "xai-grok-3-mini"
          - "xai-grok-code-fast-1"
          - "xai-grok-imagine-image"
          - "xai-grok-imagine-image-pro"
          - "xai-race-fast"
          - "xai-race-smart"
          - "xai-race-all"
        fetch: false
      titleConvo: true
      titleModel: "xai-grok-3-fast"
      summarize: false
      forcePrompt: false
      maxContextTokens: 2000000
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"

    - name: "Tier Chooser"
      apiKey: "not-needed"
      baseURL: "http://host.docker.internal:9900/v1"
      models:
        default:
          - "tier-race-quick"
          - "tier-race-medium"
          - "tier-race-full-throttle"
        fetch: true
      titleConvo: true
      titleModel: "tier-race-quick"
      summarize: false
      forcePrompt: false
      maxContextTokens: 2000000
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"
