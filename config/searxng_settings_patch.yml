  # =========================================================================
  # CANNOT ENABLE -- exact reasons for each:
  # =========================================================================
  #
  # 1. cloudflareai -- needs Cloudflare account_id + API token + AI Gateway
  #    name + model name. Not a simple API key; requires Cloudflare Workers
  #    AI subscription and gateway setup.
  #    Signup: https://developers.cloudflare.com/workers-ai/get-started/rest-api/
  #
  # 2. azure -- needs Azure AD tenant_id + client_id + client_secret.
  #    Requires an Azure subscription with configured app registration.
  #    Signup: Azure Portal -> App registrations
  #
  # 3. elasticsearch -- self-hosted only. Needs a running Elasticsearch
  #    instance with base_url, username, password, and index name.
  #
  # 4. ebay -- marked inactive by SearXNG upstream. Needs regional base_url
  #    configuration. Maintainers disabled it due to reliability issues.
  #
  # 5. chinaso (news/images/videos) -- Chinese government search engine.
  #    SearXNG docs explicitly warn: "links from chinaso.com violate users
  #    privacy." Marked inactive upstream for safety. See:
  #    https://github.com/searxng/searxng/issues/4694
  #
  # 6. z-library -- Tor-only, frequently seized/blocked by authorities.
  #    SearXNG issue #3610 documents ongoing instability.
  #
  # 7. pixiv -- needs a self-hosted image proxy server to render results.
  #    Engine works but images are blank without proxy infrastructure.
  #    Setup: https://pixivfe-docs.pages.dev/hosting/image-proxy-server/
  #
  # 8. piped / piped.music -- needs a self-hosted Piped instance (YouTube
  #    frontend). Public instances are unreliable/overloaded.
  #
  # 9. Torznab EZTV -- needs a self-hosted Jackett indexer proxy.
  #    Setup: https://github.com/Jackett/Jackett
  #
  # 10. libretranslate -- needs a self-hosted LibreTranslate instance.
  #     No centralized API key available.
  #
  # 11. grokipedia -- marked inactive upstream, experimental/broken.
  #
  # 12. spotify -- commented out in upstream config entirely. Needs OAuth
  #     client_id + client_secret from Spotify Developer Dashboard.
  #     Signup: https://developer.spotify.com/dashboard
  #
  # SELF-HOSTED DATABASES (commented out, need local infrastructure):
  #   meilisearch, mongodb, postgresql, mysql, mariadb, solr, recoll,
  #   opensemanticsearch, tubearchivist, valkey/redis, mediathekview (sqlite),
  #   invidious, doku wiki
  #
  # SHELL COMMANDS (security risk, commented out upstream):
  #   git grep, locate, find, fgrep, grep
  # =========================================================================
