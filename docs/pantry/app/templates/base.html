<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}{{ ui.site_title }}{% endblock %}</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --accent: #c9a84c;
  --accent-dim: #8b7328;
  --link: #c9a84c;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Georgia', 'Times New Roman', serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  min-height: 100vh;
}
a { color: var(--link); text-decoration: none; }
a:hover { text-decoration: underline; }

.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

header {
  border-bottom: 1px solid var(--border);
  padding: 24px 0;
  background: var(--surface);
}
header h1 {
  font-size: 1.8rem;
  color: var(--accent);
  font-weight: 400;
  letter-spacing: 0.02em;
}
header .subtitle {
  color: var(--text-muted);
  font-size: 0.95rem;
  margin-top: 4px;
  font-style: italic;
}
.lang-switch {
  float: right;
  font-size: 0.85rem;
  margin-top: 4px;
}
.lang-switch a {
  color: var(--text-muted);
  padding: 2px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: sans-serif;
}
.lang-switch a:hover { color: var(--accent); border-color: var(--accent-dim); text-decoration: none; }
.lang-switch a.active { color: var(--accent); border-color: var(--accent); }

.breadcrumb {
  padding: 16px 0;
  font-size: 0.85rem;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
}
.breadcrumb a { color: var(--text-muted); }
.breadcrumb a:hover { color: var(--accent); }
.breadcrumb .sep { margin: 0 8px; opacity: 0.5; }

.category-section { margin: 40px 0; }
.category-section h2 {
  font-size: 1.3rem;
  color: var(--accent);
  font-weight: 400;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}

.food-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
}
.food-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: border-color 0.2s, transform 0.2s;
}
.food-card:hover {
  border-color: var(--accent-dim);
  transform: translateY(-2px);
}
.food-card a { color: inherit; display: block; }
.food-card a:hover { text-decoration: none; }
.food-card .card-img {
  width: 100%;
  aspect-ratio: 3/4;
  object-fit: cover;
  display: block;
  background: #1c2128;
}
.food-card .card-body {
  padding: 14px 16px;
}
.food-card .card-title {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.3;
}
.food-card .card-desc {
  font-size: 0.8rem;
  color: var(--text-muted);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.detail-hero {
  display: grid;
  grid-template-columns: 400px 1fr;
  gap: 40px;
  margin: 40px 0;
  align-items: start;
}
.detail-hero img {
  width: 100%;
  border-radius: 8px;
  border: 1px solid var(--border);
}
.detail-hero .hero-text h2 {
  font-size: 1.6rem;
  color: var(--accent);
  font-weight: 400;
  margin-bottom: 12px;
}
.detail-hero .hero-text .brief {
  font-size: 1rem;
  color: var(--text-muted);
  font-style: italic;
  margin-bottom: 20px;
  line-height: 1.6;
}
.detail-hero .hero-text .category-badge {
  display: inline-block;
  padding: 4px 12px;
  background: var(--accent-dim);
  color: var(--bg);
  font-size: 0.75rem;
  border-radius: 4px;
  font-weight: 600;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

.detail-content {
  max-width: 800px;
  margin: 0 auto 60px;
  padding: 0 24px;
}
.detail-content h3 {
  color: var(--accent);
  font-size: 1.15rem;
  font-weight: 400;
  margin: 32px 0 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.detail-content h4 {
  color: var(--accent);
  font-size: 1rem;
  font-weight: 600;
  margin: 24px 0 10px;
}
.detail-content p {
  margin: 12px 0;
  color: var(--text);
}
.detail-content ul {
  margin: 12px 0 12px 24px;
}
.detail-content li {
  margin: 6px 0;
  color: var(--text);
}
.detail-content strong { color: var(--text); }
.detail-content em { color: var(--text-muted); font-style: italic; }

footer {
  border-top: 1px solid var(--border);
  padding: 24px 0;
  text-align: center;
  color: var(--text-muted);
  font-size: 0.8rem;
  background: var(--surface);
}

@media (max-width: 768px) {
  .detail-hero {
    grid-template-columns: 1fr;
  }
  .food-grid {
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }
  header h1 { font-size: 1.3rem; }
}
{% block extra_css %}{% endblock %}
</style>
</head>
<body>
<header>
  <div class="container">
    <span class="lang-switch">
      {% if lang == 'en' %}
        <a href="#" class="active">EN</a> <a href="{% block ru_link %}{{ request.url_for('index_ru') }}{% endblock %}">RU</a>
      {% else %}
        <a href="{% block en_link %}{{ request.url_for('index_en') }}{% endblock %}">EN</a> <a href="#" class="active">RU</a>
      {% endif %}
    </span>
    {% if lang == 'en' %}
    <h1><a href="{{ request.url_for('index_en') }}" style="color:var(--accent)">{{ ui.site_title }}</a></h1>
    {% else %}
    <h1><a href="{{ request.url_for('index_ru') }}" style="color:var(--accent)">{{ ui.site_title }}</a></h1>
    {% endif %}
    <div class="subtitle">{{ ui.subtitle }}</div>
  </div>
</header>
{% block breadcrumb %}{% endblock %}
{% block content %}{% endblock %}
<footer>
  <div class="container">{{ ui.footer }}</div>
</footer>
</body>
</html>
