# LibreChat endpoint configuration for G0DM0D3 models.
# Merge this into your main librechat.yaml under the `endpoints` key,
# or use it as a standalone config.
#
# The G0DM0D3 proxy runs on port 9600 and exposes all models under
# a single "G0DM0D3" category in the LibreChat model dropdown.

version: 1.2.1
cache: true

endpoints:
  custom:
    - name: "G0DM0D3"
      apiKey: "not-needed"
      baseURL: "http://localhost:9600/v1"
      models:
        default:
          - "godmode-classic"
          - "ultraplinian-fast"
          - "ultraplinian-standard"
          - "ultraplinian-smart"
          - "ultraplinian-power"
          - "ultraplinian-ultra"
          # Individual models (direct access with DEPTH_DIRECTIVE)
          # FAST TIER (12 models)
          - "g0dm0d3-google/gemini-2.5-flash"
          - "g0dm0d3-deepseek/deepseek-chat"
          - "g0dm0d3-perplexity/sonar"
          - "g0dm0d3-meta-llama/llama-3.1-8b-instruct"
          - "g0dm0d3-moonshotai/kimi-k2.5"
          - "g0dm0d3-x-ai/grok-code-fast-1"
