# Deep Search Portal - LibreChat Production Configuration
# Production shows ONLY the Simple group (3 models).
# All other models (Miro, Experimental, Raw-*) live in staging only.
version: 1.3.5
cache: true

modelSpecs:
  enforce: true
  prioritize: true
  list:
    - name: "xai-grok-420-multiagent"
      label: "Grok 4.20 Multi-Agent"
      description: "xAI most powerful model. Coordinates parallel reasoning with built-in web and X/Twitter search. 2M token context."
      group: "Simple"
      default: true
      preset:
        endpoint: "xAI Native"
        model: "xai-grok-4.20-multi-agent-0309"

    - name: "heretic-uncensored"
      label: "Heretic Uncensored"
      description: "GLM-4.7 Flash Heretic — zero-censorship model with Firecrawl scraping, Exa semantic search, and Brave web search. Fast, powerful, completely unfiltered."
      group: "Simple"
      preset:
        endpoint: "Heretic"
        model: "glm-4.7-flash-heretic"

    - name: "tier-race-full-throttle"
      label: "Tier Race (Full Throttle)"
      description: "Races 9 flagship models (Opus, Gemini Pro, GPT-5.4 High, Grok 4.20, DeepSeek R1, Kimi, GLM, Qwen Max, Mistral). Maximum intelligence."
      group: "Simple"
      preset:
        endpoint: "Tier Chooser"
        model: "tier-race-full-throttle"

# ── Backend endpoint wiring ──
endpoints:
  custom:
    - name: "Mistral Thinking"
      apiKey: "not-needed"
      baseURL: "http://localhost:9100/v1"
      models:
        default:
          - "mistral-large-thinking"
        fetch: true
      titleConvo: true
      titleModel: "mistral-large-thinking"
      titleMethod: "completion"
      summarize: false
      maxContextTokens: 1000000
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"

    - name: "Persistent MiroFlow"
