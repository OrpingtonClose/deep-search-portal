# =============================================================================
# Deep Search Portal — LibreChat Custom Endpoints (Native Deployment)
#
# Configures LibreChat to use the Deep Search proxy services as custom
# OpenAI-compatible endpoints.  Each proxy exposes /v1/chat/completions
# and /v1/models on its respective port.
#
# For native (non-Docker) deployment, baseURL uses localhost.
# For Docker deployment, change localhost to host.docker.internal.
#
# Proxy services:
#   - Thinking Proxy:              port 9100
#   - Deep Research Proxy:         port 9200
#   - Persistent Deep Research:    port 9300
#   - Swarm Deep Search:           port 9500
# =============================================================================

version: 1.3.6
cache: true

endpoints:
  custom:
    - name: "Mistral Thinking"
      apiKey: "not-needed"
      baseURL: "http://localhost:9100/v1"
      models:
        default:
          - "mistral-large-thinking"
        fetch: true
      titleConvo: true
      titleModel: "mistral-large-thinking"
      summarize: false
      maxContextTokens: 1000000
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"
      modelDisplayLabel: "Mistral Thinking"
      iconURL: "https://mistral.ai/favicon.ico"

    - name: "Persistent MiroFlow"
      apiKey: "not-needed"
      baseURL: "http://localhost:9300/v1"
      models:
        default:
          - "persistent-miroflow"
        fetch: true
      titleConvo: true
      titleModel: "persistent-miroflow"
      summarize: false
      maxContextTokens: 1000000
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"
      modelDisplayLabel: "Persistent MiroFlow"

    - name: "Deep Research"
      apiKey: "not-needed"
      baseURL: "http://localhost:9200/v1"
      models:
        default:
          - "miroflow"
        fetch: true
      titleConvo: true
      titleModel: "miroflow"
      summarize: false
      maxContextTokens: 1000000
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"
      modelDisplayLabel: "Deep Research"

    - name: "Swarm Deep Search"
      apiKey: "not-needed"
      baseURL: "http://localhost:9500/v1"
      models:
        default:
          - "swarm-miroflow"
        fetch: true
      titleConvo: true
      titleModel: "swarm-miroflow"
      summarize: false
      maxContextTokens: 1000000
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"
      modelDisplayLabel: "Swarm Deep Search"
