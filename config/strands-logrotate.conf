# Strands Agent Log Rotation
#
# Manages two JSONL files produced by the strands-agent observability module:
#   1. strands-metrics.jsonl   — one compact JSON line per request (~1 KB each)
#   2. strands-agent-debug.jsonl — Strands SDK internal debug logs (verbose)
#
# Install:
#   sudo cp config/strands-logrotate.conf /etc/logrotate.d/strands-agent
#   sudo logrotate --debug /etc/logrotate.d/strands-agent   # dry-run test
#
# The strands-agent process holds files open, so we use copytruncate
# (atomic copy + truncate in place) rather than sending a signal.

/var/log/strands-metrics.jsonl /var/log/strands-agent-debug.jsonl {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    size 50M
}
